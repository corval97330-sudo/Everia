<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everia Life — Рабочее пространство</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c12;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --text: #e8eaf0;
  --dim: #5a6080;
  --surface: #12151f;
  --border: #1e2235;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Golos Text", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Фоновые элементы */
.bg-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  pointer-events: none;
}
.bg-glow-1 {
  width: 500px; height: 500px;
  background: var(--gold);
  top: -150px; left: -150px;
  animation: drift1 12s ease-in-out infinite;
}
.bg-glow-2 {
  width: 400px; height: 400px;
  background: #4f6cf7;
  bottom: -100px; right: -100px;
  animation: drift2 15s ease-in-out infinite;
}
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

@keyframes drift1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(40px, 30px); }
}
@keyframes drift2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-30px, -40px); }
}

/* Основной контейнер */
.wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 480px;
  padding: 24px 20px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Шапка */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.logo {
  font-family: "Unbounded", sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0.9;
}
.title {
  font-family: "Unbounded", sans-serif;
  font-size: 26px;
  font-weight: 900;
  line-height: 1.2;
  background: linear-gradient(135deg, #fff 0%, var(--gold2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 13px;
  color: var(--dim);
  letter-spacing: 0.5px;
}

/* Разделитель */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.divider-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.5;
}

/* Карточки приложений */
.apps {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.app-card {
  display: block;
  text-decoration: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}

.app-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.app-card.tracker::before { background: linear-gradient(90deg, #6b5ce7, #4f9cf9); }
.app-card.desk::before { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.app-card.agent::before { background: linear-gradient(90deg, #3ecf8e, #4f9cf9); }

.app-card:hover {
  transform: translateY(-3px);
  border-color: rgba(201,168,76,0.25);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.app-card:hover::before { opacity: 1; }

.app-card:active { transform: translateY(-1px); }

.card-inner {
  display: flex;
  align-items: center;
  gap: 18px;
}

.app-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.tracker .app-icon { background: rgba(107,92,231,0.15); }
.desk .app-icon { background: rgba(201,168,76,0.12); }
.agent .app-icon { background: rgba(62,207,142,0.12); }

.app-info { flex: 1; }
.app-name {
  font-family: "Unbounded", sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.app-desc {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.4;
}

.app-arrow {
  font-size: 18px;
  color: var(--dim);
  transition: transform 0.2s ease, color 0.2s ease;
}
.app-card:hover .app-arrow {
  transform: translateX(4px);
  color: var(--gold);
}

/* Футер */
.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
  opacity: 0.6;
}

/* Мобильная адаптация */
@media (max-width: 480px) {
  .title { font-size: 22px; }
  .app-card { padding: 18px 18px; }
  .app-icon { width: 46px; height: 46px; font-size: 20px; }
}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="bg-grid"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo">Everia Life</div>
    <div class="title">Рабочее<br>пространство</div>
    <div class="subtitle">Все инструменты в одном месте</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="apps">

    <a class="app-card tracker" href="tracker.html" target="_blank">
      <div class="card-inner">
        <div class="app-icon">👥</div>
        <div class="app-info">
          <div class="app-name">Трекер агентов</div>
          <div class="app-desc">Этапы, статусы, мотивация команды</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
    </a>

    <a class="app-card desk" href="desktop.html" target="_blank">
      <div class="card-inner">
        <div class="app-icon">🏆</div>
        <div class="app-info">
          <div class="app-name">Рабочий стол</div>
          <div class="app-desc">Бонусы, дни рождения, дашборд</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
    </a>

    <a class="app-card agent" href="agent.html" target="_blank">
      <div class="card-inner">
        <div class="app-icon">🤝</div>
        <div class="app-info">
          <div class="app-name">Помощник агента</div>
          <div class="app-desc">Скрипты, фазы встречи, запись звонков</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
    </a>

  </div>

  <div class="footer">Marina · Everia Life · 2026</div>
</div>

</body>
</html>
