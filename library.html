<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everia Life — Библиотека скриптов</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14;--surface:#111520;--surface2:#171d2e;--border:#1e2640;
  --gold:#c9a84c;--gold2:#e8c97a;--text:#e8eaf0;--dim:#5a6080;
  --green:#3ecf8e;--red:#f56060;--blue:#4f9cf9;--orange:#f5a623;--purple:#8b6cf7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 40% 40%,#151a2e 0%,var(--bg) 70%);}
.loginBox{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:360px;position:relative;}
.loginBox::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.loginLogo{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;color:var(--gold);text-align:center;margin-bottom:8px;}
.loginTitle{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;text-align:center;margin-bottom:4px;}
.loginSub{font-size:12px;color:var(--dim);text-align:center;margin-bottom:32px;}
.loginInp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;padding:12px 14px;outline:none;text-align:center;margin-bottom:14px;}
.loginInp:focus{border-color:var(--gold);}
.loginBtn{width:100%;background:var(--gold);color:#0a0d14;border:none;border-radius:10px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;padding:13px;cursor:pointer;}
.loginErr{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

/* APP */
#app{display:none;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hLeft{display:flex;align-items:center;gap:14px;}
.hLogo{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--gold);}
.hDiv{width:1px;height:18px;background:var(--border);}
.hTitle{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;}
.hBtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:12px;padding:5px 11px;cursor:pointer;}
.hBtn:hover{border-color:var(--gold);color:var(--gold);}

/* SEARCH */
.searchBar{padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
.searchInp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;padding:11px 16px;outline:none;}
.searchInp:focus{border-color:var(--gold);}

/* CATEGORY TABS */
.catBar{padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto;}
.catBar::-webkit-scrollbar{display:none;}
.catBtn{background:none;border:none;color:var(--dim);font-family:'Golos Text',sans-serif;font-size:12px;font-weight:500;padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.catBtn:hover{color:var(--text);}
.catBtn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN */
.main{padding:20px;max-width:900px;margin:0 auto;}

/* SCRIPT SECTION */
.section{margin-bottom:28px;}
.sectionHead{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sectionIcon{font-size:20px;}
.sectionTitle{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.sectionCount{font-size:11px;color:var(--dim);background:var(--surface2);border-radius:10px;padding:2px 8px;}

/* SCRIPT BLOCK */
.scriptBlock{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.scriptHead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;}
.scriptHead:hover{background:var(--surface2);}
.scriptName{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--gold);}
.scriptMeta{font-size:11px;color:var(--dim);margin-top:2px;}
.scriptChevron{color:var(--dim);font-size:14px;flex-shrink:0;transition:transform .2s;}
.scriptBody{display:none;padding:4px 18px 18px;}
.scriptBody.open{display:block;}

/* SCENE */
.scene{margin-bottom:14px;}
.sceneLabel{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* DIALOG LINES */
.line{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.lineRole{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;width:28px;padding-top:2px;}
.lineRole.m{color:var(--gold);}
.lineRole.a{color:var(--blue);}
.lineRole.k{color:var(--green);}
.lineText{font-size:13px;line-height:1.65;color:var(--text);background:var(--surface2);border-radius:8px;padding:8px 12px;flex:1;cursor:pointer;transition:all .15s;position:relative;}
.lineText:hover{border:1px solid rgba(201,168,76,.3);}
.lineText.copied{border:1px solid var(--green) !important;background:rgba(62,207,142,.06);}
.copyHint{position:absolute;top:4px;right:8px;font-size:10px;color:var(--green);opacity:0;transition:opacity .3s;}
.lineText.copied .copyHint{opacity:1;}

/* NOTE BOX */
.noteBox{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--dim);line-height:1.7;}
.noteBox strong{color:var(--gold);}

/* BLOCK TITLE */
.blockTitle{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--dim);}

/* COPY ALL BTN */
.copyAllBtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:11px;padding:5px 12px;cursor:pointer;margin-top:10px;}
.copyAllBtn:hover{border-color:var(--gold);color:var(--gold);}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .25s ease;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginBox">
    <div class="loginLogo">EVERIA LIFE</div>
    <div class="loginTitle">Библиотека</div>
    <div class="loginSub">Скрипты и сценарии</div>
    <input class="loginInp" type="password" id="pwd" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <button class="loginBtn" onclick="login()">Войти</button>
    <div class="loginErr" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="hLeft">
      <span class="hLogo">EVERIA</span>
      <div class="hDiv"></div>
      <span class="hTitle">Библиотека скриптов</span>
    </div>
    <button class="hBtn" onclick="logout()">Выйти</button>
  </div>

  <div class="searchBar">
    <input class="searchInp" type="text" id="searchInp" placeholder="🔍 Поиск по скриптам..." oninput="doSearch()">
  </div>

  <div class="catBar" id="catBar"></div>

  <div class="main" id="mainContent"></div>
</div>

<script>
const PASSWORD = 'Everia2026';

function login() {
  if (document.getElementById('pwd').value === PASSWORD) {
    sessionStorage.setItem('ev_lib','1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('loginErr').textContent = 'Неверный пароль';
  }
}
function logout() { sessionStorage.removeItem('ev_lib'); location.reload(); }

// ─── DATA ────────────────────────────────────────────────

          { role: 'М', text: 'Предлагаю скрепить наши договорённости, подписав первый протокол о встрече. Очень хочу, чтобы ты стала успешным и самостоятельным финансовым консультантом!' },

  // ─── РИВ ─────────────────────────────────────────────

      {

      {
        label: '🎯 Рекрутинг из портфеля',
        color: 'var(--green)',
        lines: [
          { role: 'М', text: 'И тут очень уместно предложить ей работу или подработку у нас — про это всегда помни при сервисных встречах с клиентами, у которых сложная финансовая ситуация.' },
        ]
      }
    ]
  }
];

// ─── RENDER ───────────────────────────────────────────────
let currentCat = 'all';
let currentSearch = '';

function init() {
  renderCats();
  renderContent();
}

function renderCats() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATEGORIES.map(c =>
    `<button class="catBtn ${c.id === currentCat ? 'active' : ''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id) {
  currentCat = id;
  renderCats();
  renderContent();
}

function doSearch() {
  currentSearch = document.getElementById('searchInp').value.toLowerCase();
  renderContent();
}

function getFiltered() {
  return SCRIPTS.filter(s => {
    const catOk = currentCat === 'all' || s.cat === currentCat;
    if (!catOk) return false;
    if (!currentSearch) return true;
    const haystack = (s.name + s.meta + s.scenes.map(sc => sc.lines.map(l => l.text).join(' ')).join(' ')).toLowerCase();
    return haystack.includes(currentSearch);
  });
}

function renderContent() {
  const scripts = getFiltered();
  const main = document.getElementById('mainContent');
  if (!scripts.length) {
    main.innerHTML = '<div class="empty"><div style="font-size:40px;margin-bottom:12px">🔍</div><div>Ничего не найдено</div></div>';
    return;
  }
  main.innerHTML = scripts.map(s => renderScript(s)).join('');
}

function renderScript(s) {
  const scenes = s.scenes.map(sc => `
    <div class="scene">
      <div class="blockTitle" style="color:${sc.color}">${sc.label}</div>
      ${sc.lines.map((l, i) => `
        <div class="line">
          <span class="lineRole ${l.role === 'М' ? 'm' : l.role === 'А' ? 'a' : 'k'}">${l.role}</span>
          <div class="lineText" onclick="copyLine(this)">${l.text.replace(/\n/g,'<br>')}<span class="copyHint">✓ скопировано</span></div>
        </div>
      `).join('')}
    </div>
  `).join('');

  return `
    <div class="scriptBlock fadeUp" id="sb_${s.id}">
      <div class="scriptHead" onclick="toggleScript('${s.id}')">
        <div>
          <div class="scriptName">${s.name}</div>
          <div class="scriptMeta">${s.meta}</div>
        </div>
        <span class="scriptChevron" id="ch_${s.id}">▼</span>
      </div>
      <div class="scriptBody" id="body_${s.id}">
        <div class="noteBox">💡 Нажми на любую реплику — она скопируется в буфер обмена</div>
        ${scenes}
      </div>
    </div>
  `;
}

function toggleScript(id) {
  const body = document.getElementById('body_' + id);
  const ch = document.getElementById('ch_' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  if (ch) ch.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function copyLine(el) {
  const text = el.innerText.replace('✓ скопировано','').trim();
  navigator.clipboard.writeText(text).catch(() => {});
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1500);
}

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (sessionStorage.getItem('ev_lib')) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
});
</script>
